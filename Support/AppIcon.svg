<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2e3268"/>
      <stop offset="1" stop-color="#12142e"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d8f0"/>
      <stop offset="1" stop-color="#3f7dfb"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc23e"/>
      <stop offset="1" stop-color="#ff5f96"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-6%" width="116%" height="118%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <clipPath id="squircle">
      <rect x="100" y="100" width="824" height="824" rx="186"/>
    </clipPath>
  </defs>

  <!-- Background squircle -->
  <rect x="100" y="100" width="824" height="824" rx="186" fill="url(#bg)" filter="url(#shadow)"/>

  <g clip-path="url(#squircle)">
    <!-- Depth rings -->
    <circle cx="512" cy="512" r="340" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2"/>
    <circle cx="512" cy="512" r="430" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="2"/>

    <!-- Routes: glow layer -->
    <g fill="none" stroke-width="30" stroke-linecap="round" filter="url(#glow)" opacity="0.55">
      <path d="M 512 420 C 512 515, 310 500, 310 590" stroke="url(#teal)"/>
      <path d="M 512 420 C 512 515, 694 500, 694 600" stroke="url(#coral)"/>
    </g>
    <!-- Routes: sharp layer -->
    <g fill="none" stroke-width="30" stroke-linecap="round">
      <path d="M 512 420 C 512 515, 310 500, 310 590" stroke="url(#teal)"/>
      <path d="M 512 420 C 512 515, 694 500, 694 600" stroke="url(#coral)"/>
    </g>
    <!-- Flow dots -->
    <circle cx="381" cy="516" r="9" fill="#ffffff" fill-opacity="0.95"/>
    <circle cx="630" cy="515" r="9" fill="#ffffff" fill-opacity="0.95"/>

    <!-- Source chip: an app emitting audio -->
    <rect x="422" y="240" width="180" height="180" rx="44" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.25" stroke-width="3"/>
    <g fill="#ffffff">
      <rect x="444" y="306" width="16" height="48" rx="8"/>
      <rect x="474" y="286" width="16" height="88" rx="8"/>
      <rect x="504" y="268" width="16" height="124" rx="8"/>
      <rect x="534" y="292" width="16" height="76" rx="8"/>
      <rect x="564" y="304" width="16" height="52" rx="8"/>
    </g>

    <!-- Speaker (left destination) -->
    <g>
      <rect x="232" y="668" width="42" height="64" rx="10" fill="url(#teal)"/>
      <path d="M 272 660 L 328 610 L 328 790 L 272 740 Z" fill="url(#teal)"/>
      <g fill="none" stroke="url(#teal)" stroke-width="16" stroke-linecap="round">
        <path d="M 356 664 A 46 46 0 0 1 356 736"/>
        <path d="M 390 636 A 82 82 0 0 1 390 764"/>
      </g>
    </g>

    <!-- Headphones (right destination) -->
    <g>
      <path d="M 610 730 A 84 84 0 0 1 778 730" fill="none" stroke="url(#coral)" stroke-width="26" stroke-linecap="round"/>
      <rect x="590" y="722" width="40" height="78" rx="18" fill="url(#coral)"/>
      <rect x="758" y="722" width="40" height="78" rx="18" fill="url(#coral)"/>
    </g>

    <!-- Top sheen -->
    <rect x="100" y="100" width="824" height="824" rx="186" fill="url(#sheen)"/>
  </g>

  <!-- Inner hairline -->
  <rect x="101.5" y="101.5" width="821" height="821" rx="185" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="3"/>
</svg>
